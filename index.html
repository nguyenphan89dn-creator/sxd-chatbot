<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chatbot Sở Xây dựng</title>
</head>

<body>

<h2>Chatbot Sở Xây dựng Đà Nẵng</h2>

<input id="question" style="width:400px;">
<button onclick="ask()">Gửi</button>

<div id="answer"></div>

<script>

async function ask(){

    const question =
        document.getElementById("question").value;

    const response = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            question:question
        })
    });

    const data = await response.json();

    document.getElementById("answer").innerHTML =
        data.answer;
}

</script>

</body>
</html>
