<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chatbot Sở Xây dựng Đà Nẵng</title>
</head>

<body>

<h1>Chatbot Sở Xây dựng Đà Nẵng</h1>

<input id="question" size="60">
<button onclick="ask()">Gửi</button>

<br><br>

<div id="answer"></div>

<script>

async function ask() {

    let question =
        document.getElementById("question").value;

    let response = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            question: question
        })
    });

    let data = await response.json();

    document.getElementById("answer").innerHTML =
        "<b>Trả lời:</b><br><br>" +
        data.answer;
}

</script>

</body>
</html>
